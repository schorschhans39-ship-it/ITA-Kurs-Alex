<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Italiano — 1000 Woerter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f0d0b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;color:#ede8e0}
.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex}
/* HOME */
#screenHome{}
.inner{padding:1.5rem 1rem 3rem;max-width:500px;margin:0 auto;width:100%}
h1{font-family:Georgia,serif;font-size:2.2rem;font-style:italic;color:#c97a3a;margin-bottom:.2rem}
.sub{font-size:.7rem;font-family:monospace;color:#5a5048;letter-spacing:.12em;text-transform:uppercase;margin-bottom:1.5rem}
.slbl{font-size:.65rem;font-family:monospace;text-transform:uppercase;letter-spacing:.14em;color:#c97a3a;margin:1.1rem 0 .5rem}
.flag{display:flex;gap:4px;margin-bottom:.8rem}
.flag div{width:14px;height:9px;border-radius:2px}
/* Pills */
.row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem}
.pill{padding:5px 13px;border-radius:20px;border:1px solid #2e2820;background:transparent;color:#9a8d80;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .15s}
.pill.ab{background:#009246;border-color:#009246;color:#fff}
.pill.aa{background:#ce2b37;border-color:#ce2b37;color:#fff}
.pill.ax{background:#c97a3a;border-color:#c97a3a;color:#fff}
/* Categories */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;margin-bottom:1rem}
.cbtn{padding:.55rem .65rem;background:#1a1612;border:1px solid #2e2820;border-radius:7px;color:#9a8d80;font-size:.75rem;cursor:pointer;text-align:left;font-family:inherit;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.cbtn.on{border-color:#c97a3a;color:#ede8e0;background:#231f1a}
.cnum{font-size:.6rem;color:#5a5048;font-family:monospace}
.cbtn.on .cnum{color:#c97a3a}
/* Progress */
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:.7rem}
.pcell{background:#1a1612;border-radius:6px;padding:.5rem;text-align:center;border:1px solid #2e2820}
.pnum{font-family:Georgia,serif;font-size:1.3rem;font-weight:600}
.plbl{font-size:.55rem;font-family:monospace;text-transform:uppercase;color:#5a5048;margin-top:1px}
.pbar{height:5px;background:#1a1612;border-radius:3px;overflow:hidden;display:flex;margin-bottom:.4rem}
/* Buttons home */
.bstart{width:100%;padding:1rem;background:linear-gradient(135deg,#009246,#2d6e3e);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.3rem}
.breset{width:100%;padding:.65rem;background:none;border:1px solid #2e2820;border-radius:8px;font-size:.72rem;color:#5a5048;cursor:pointer;font-family:monospace;margin-top:.5rem}
/* TOPBAR */
.topbar{background:#1a1612;border-bottom:1px solid #2e2820;padding:.65rem 1.1rem;display:flex;align-items:center;gap:.8rem;flex-shrink:0}
.pbarw{flex:1;height:5px;background:#231f1a;border-radius:3px;overflow:hidden}
.pbarf{height:100%;background:linear-gradient(90deg,#009246,#c97a3a);border-radius:3px;transition:width .3s}
.tc{font-family:monospace;font-size:.7rem}
.bend{background:none;border:1px solid #2e2820;border-radius:5px;padding:4px 10px;color:#9a8d80;font-size:.68rem;cursor:pointer;font-family:monospace;white-space:nowrap}
/* STUDY SCREENS */
.study-inner{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.2rem 1rem;gap:.9rem}
/* Card */
.card{width:100%;max-width:460px;background:#1a1612;border:1.5px solid #2e2820;border-radius:14px;padding:2rem 1.5rem;text-align:center;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.7rem;user-select:none}
.card.flipped{border-color:#c97a3a;box-shadow:0 6px 24px rgba(201,122,58,.15)}
.word{font-family:Georgia,serif;font-size:clamp(1.7rem,5.5vw,2.4rem);font-style:italic;font-weight:600;color:#c97a3a;line-height:1.2}
.word.de{font-style:normal;color:#ede8e0}
.divider{width:65%;height:1px;background:#2e2820}
.trans{font-family:Georgia,serif;font-size:clamp(1.2rem,3.5vw,1.7rem);color:#ede8e0}
.exbox{background:#231f1a;border-radius:8px;padding:.6rem .9rem;width:100%;text-align:left}
.exit{font-family:Georgia,serif;font-style:italic;color:#c97a3a;font-size:.88rem;margin-bottom:3px}
.exde{font-size:.74rem;color:#9a8d80}
.tts{background:none;border:1px solid #2e2820;border-radius:20px;padding:3px 11px;font-size:.66rem;color:#9a8d80;cursor:pointer;font-family:monospace}
.badges{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.badge{font-size:.57rem;padding:2px 7px;border-radius:3px;font-family:monospace;text-transform:uppercase;letter-spacing:.05em}
/* FRONT — reveal button TOP */
.brev{width:100%;max-width:460px;padding:.95rem;font-size:.95rem;background:#231f1a;color:#9a8d80;border:1.5px solid #2e2820;border-radius:10px;cursor:pointer;font-family:inherit;order:-1}
/* BACK — answer buttons BOTTOM */
.arow{display:flex;gap:.9rem;width:100%;max-width:460px;margin-top:auto;padding-bottom:.3rem}
.bno{flex:1;padding:1.05rem;font-size:1.05rem;font-weight:700;background:#1a1612;color:#c0392b;border:2px solid #c0392b;border-radius:12px;cursor:pointer;font-family:inherit}
.byes{flex:1;padding:1.05rem;font-size:1.05rem;font-weight:700;background:#1a1612;color:#4a9a5a;border:2px solid #4a9a5a;border-radius:12px;cursor:pointer;font-family:inherit}
/* RESULT — next button TOP */
.result-inner{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.8rem 1rem 1rem;gap:1rem}
.rbox{width:100%;max-width:460px;background:#1a1612;border-radius:14px;padding:1.5rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.5rem}
.rico{font-size:2.5rem}
.rlbl{font-family:Georgia,serif;font-size:1.2rem;font-weight:600}
.rsub{font-size:.68rem;font-family:monospace;color:#5a5048}
.bnext{width:100%;max-width:460px;padding:1.05rem;font-size:1.05rem;font-weight:700;background:#c97a3a;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
/* DONE */
.done-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:1rem;text-align:center}
.dem{font-size:3rem}
.dtit{font-family:Georgia,serif;font-size:2rem;font-weight:600;color:#ede8e0}
.dsub{font-family:Georgia,serif;font-style:italic;color:#c97a3a}
.dstats{background:#1a1612;border:1px solid #2e2820;border-radius:12px;padding:1.4rem;width:100%;max-width:460px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.snum{font-family:Georgia,serif;font-size:2.2rem;font-weight:600}
.slb{font-size:.62rem;color:#9a8d80;font-family:monospace;text-transform:uppercase;margin-top:2px}
.bhome{width:100%;max-width:460px;padding:.9rem;background:#1a1612;border:1px solid #c97a3a;color:#c97a3a;border-radius:10px;font-size:.9rem;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen active" id="screenHome">
<div class="inner" style="overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;">
  <div class="flag"><div style="background:#009246"></div><div style="background:#f0ebe0"></div><div style="background:#ce2b37"></div></div>
  <h1>1000 <em>parole</em></h1>
  <div class="sub">Karteikarten &middot; Italiano &middot; DE</div>

  <div class="slbl">Fortschritt</div>
  <div class="pgrid">
    <div class="pcell"><div class="pnum" style="color:#5a5048" id="pN">0</div><div class="plbl">Neu</div></div>
    <div class="pcell"><div class="pnum" style="color:#c97a3a" id="pL">0</div><div class="plbl">Lernend</div></div>
    <div class="pcell"><div class="pnum" style="color:#009246" id="pK">0</div><div class="plbl">Bekannt</div></div>
    <div class="pcell"><div class="pnum" style="color:#6a4a9a" id="pM">0</div><div class="plbl">Gemeistert</div></div>
  </div>
  <div class="pbar" id="progBar"></div>

  <div class="slbl">Level</div>
  <div class="row">
    <button class="pill ax" id="pilAll" onclick="setLvl('all')">Alle</button>
    <button class="pill" id="pilB" onclick="setLvl('B')">&#x1F7E2; Beginner</button>
    <button class="pill" id="pilA" onclick="setLvl('A')">&#x1F534; Fortgeschritten</button>
  </div>

  <div class="slbl">Richtung</div>
  <div class="row">
    <button class="pill ax" id="dirIT" onclick="setDir('it')">IT &rarr; DE</button>
    <button class="pill" id="dirDE" onclick="setDir('de')">DE &rarr; IT</button>
    <button class="pill" id="dirMix" onclick="setDir('mix')">&#x1F500; Mix</button>
  </div>

  <div class="slbl">Themen <span style="color:#5a5048;font-size:.6rem">(leer = alle)</span></div>
  <div class="cgrid" id="catGrid"></div>

  <div class="slbl">Karten pro Session</div>
  <div class="row" id="sizeRow">
    <button class="pill" onclick="setSize(10)">10</button>
    <button class="pill ax" onclick="setSize(20)">20</button>
    <button class="pill" onclick="setSize(30)">30</button>
    <button class="pill" onclick="setSize(50)">50</button>
    <button class="pill" onclick="setSize(9999)">Alle</button>
  </div>

  <button class="bstart" onclick="startSession()">Lernen starten &rarr;</button>
  <button class="breset" onclick="resetProgress()">&#x21BA; Fortschritt zuruecksetzen</button>
</div>
</div>

<!-- ══ FRONT ══ -->
<div class="screen" id="screenFront">
  <div class="topbar">
    <button class="bend" onclick="endSession()">&#x2190; Ende</button>
    <div class="pbarw"><div class="pbarf" id="pbar1" style="width:0%"></div></div>
    <span class="tc" style="color:#9a8d80" id="c1">1/20</span>
    <span class="tc" style="color:#4a9a5a" id="s1ok">0&#x2713;</span>
    <span class="tc" style="color:#c0392b" id="s1no">0&#x2717;</span>
  </div>
  <div class="study-inner">
    <!-- REVEAL AT TOP — ghost tap lands here, but Back screen has no button at top -->
    <button class="brev" id="btnReveal" onclick="reveal()">&#x2193; Loesung anzeigen</button>
    <div class="card">
      <div class="badges" id="badges1"></div>
      <div class="word" id="fw">&#x2013;</div>
    </div>
  </div>
</div>

<!-- ══ BACK ══ -->
<div class="screen" id="screenBack">
  <div class="topbar">
    <button class="bend" onclick="endSession()">&#x2190; Ende</button>
    <div class="pbarw"><div class="pbarf" id="pbar2" style="width:0%"></div></div>
    <span class="tc" style="color:#9a8d80" id="c2">1/20</span>
    <span class="tc" style="color:#4a9a5a" id="s2ok">0&#x2713;</span>
    <span class="tc" style="color:#c0392b" id="s2no">0&#x2717;</span>
  </div>
  <div class="study-inner">
    <div class="card flipped">
      <div class="word" id="bw">&#x2013;</div>
      <div class="divider"></div>
      <div class="trans" id="bt">&#x2013;</div>
      <div class="exbox">
        <div class="exit" id="beit">&#x2013;</div>
        <div class="exde" id="bede">&#x2013;</div>
      </div>
      <button class="tts" onclick="speakIt()">&#x1F50A; Anhoeren</button>
    </div>
    <!-- ANSWER BUTTONS AT BOTTOM — ghost tap from reveal (top) cannot reach here -->
    <div class="arow">
      <button class="bno" onclick="answer(false)">&#x2717; Nochmal</button>
      <button class="byes" onclick="answer(true)">&#x2713; Gewusst</button>
    </div>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div class="screen" id="screenResult">
  <div class="topbar">
    <button class="bend" onclick="endSession()">&#x2190; Ende</button>
    <div class="pbarw"><div class="pbarf" id="pbar3" style="width:0%"></div></div>
    <span class="tc" style="color:#9a8d80" id="c3">1/20</span>
    <span class="tc" style="color:#4a9a5a" id="s3ok">0&#x2713;</span>
    <span class="tc" style="color:#c0392b" id="s3no">0&#x2717;</span>
  </div>
  <div class="result-inner">
    <!-- NEXT AT TOP — ghost tap from answer buttons (bottom) cannot reach here -->
    <button class="bnext" id="btnNext" onclick="nextCard()">Naechste Karte &rarr;</button>
    <div class="rbox" id="rbox">
      <div class="rico" id="rico">&#x2013;</div>
      <div class="rlbl" id="rlbl">&#x2013;</div>
      <div class="rsub" id="rsub">&#x2013;</div>
    </div>
  </div>
</div>

<!-- ══ DONE ══ -->
<div class="screen" id="screenDone">
  <div class="done-inner">
    <div class="dem" id="demi">&#x1F389;</div>
    <div class="dtit">Session beendet!</div>
    <div class="dsub" id="dsub">Ottimo lavoro!</div>
    <div class="dstats">
      <div><div class="snum" style="color:#4a9a5a" id="dok">0</div><div class="slb">Richtig</div></div>
      <div><div class="snum" style="color:#c0392b" id="dno">0</div><div class="slb">Nochmal</div></div>
      <div><div class="snum" style="color:#c97a3a" id="dtot">0</div><div class="slb">Gesamt</div></div>
    </div>
    <button class="bhome" onclick="goHome()">&#x2190; Zurueck zur Uebersicht</button>
  </div>
</div>

// State
var selLvl="all", selDir="it", selSize=20;
var selCats={};
var deck=[], idx=0, sOk=0, sNo=0;
var STORAGE_KEY="italiano_progress_v1";
var progress=(function(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return{};}})();
function saveProgress(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(progress));}catch(e){}}
function wkey(w){return w[2]+"|"+w[1];}
function getBkt(w){return progress[wkey(w)]||1;}
function setBkt(w,b){progress[wkey(w)]=Math.max(1,Math.min(4,b));saveProgress();}

// Init
function getCats(){var c={};W.forEach(function(w){if(!c[w[1]])c[w[1]]=0;c[w[1]]++;});return c;}

function buildCatGrid(){
  var cats=getCats(), g=document.getElementById("catGrid");
  g.innerHTML="";
  Object.keys(cats).sort().forEach(function(c){
    var b=document.createElement("button");
    b.className="cbtn"+(selCats[c]?" on":"");
    b.innerHTML=c+'<span class="cnum">'+cats[c]+'</span>';
    b.onclick=function(){selCats[c]=!selCats[c];b.classList.toggle("on",!!selCats[c]);};
    g.appendChild(b);
  });
}

function setLvl(l){
  selLvl=l;
  document.getElementById("pilAll").className="pill"+(l==="all"?" ax":"");
  document.getElementById("pilB").className="pill"+(l==="B"?" ab":"");
  document.getElementById("pilA").className="pill"+(l==="A"?" aa":"");
}
function setDir(d){
  selDir=d;
  ["dirIT","dirDE","dirMix"].forEach(function(id){document.getElementById(id).className="pill";});
  document.getElementById(d==="it"?"dirIT":d==="de"?"dirDE":"dirMix").className="pill ax";
}
function setSize(s){
  selSize=s;
  document.querySelectorAll("#sizeRow .pill").forEach(function(p,i){
    p.className="pill"+([10,20,30,50,9999][i]===s?" ax":"");
  });
}

function updateHomeProgress(){
  var c=[0,0,0,0];
  W.forEach(function(w){c[getBkt(w)-1]++;});
  document.getElementById("pN").textContent=c[0];
  document.getElementById("pL").textContent=c[1];
  document.getElementById("pK").textContent=c[2];
  document.getElementById("pM").textContent=c[3];
  var tot=W.length, cols=["#5a5048","#c97a3a","#009246","#6a4a9a"];
  document.getElementById("progBar").innerHTML=c.map(function(n,i){
    return '<div style="flex:'+n+';background:'+cols[i]+';height:100%"></div>';
  }).join("");
}

function resetProgress(){progress={};saveProgress();updateHomeProgress();}

function show(n){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.getElementById("screen"+n).classList.add("active");
}

function isIT(){return selDir==="it"||(selDir==="mix"&&idx%2===0);}

function loadCard(){
  var w=deck[idx], it=isIT();
  var front=it?w[2]:w[3];
  var lvC=w[0]==="B"?"#009246":"#ce2b37";
  var bkt=getBkt(w);
  var bktC={1:"#5a5048",2:"#c97a3a",3:"#009246",4:"#6a4a9a"};
  var bktL={1:"Neu",2:"Lernend",3:"Bekannt",4:"Gemeistert"};
  var lvL=w[0]==="B"?"Beginner":"Fortgeschritten";

  document.getElementById("fw").textContent=front;
  document.getElementById("fw").className="word"+(it?"":" de");
  document.getElementById("badges1").innerHTML=
    '<span class="badge" style="background:'+lvC+'22;color:'+lvC+';border:1px solid '+lvC+'44">'+lvL+'</span>'+
    '<span class="badge" style="background:'+bktC[bkt]+'22;color:'+bktC[bkt]+';border:1px solid '+bktC[bkt]+'44">'+bktL[bkt]+'</span>'+
    '<span class="badge" style="background:#1a1612;color:#5a5048;border:1px solid #2e2820">'+w[1]+'</span>';

  document.getElementById("bw").textContent=it?w[2]:w[3];
  document.getElementById("bw").className="word"+(it?"":" de");
  document.getElementById("bt").textContent=it?w[3]:w[2];
  document.getElementById("beit").textContent=w[4];
  document.getElementById("bede").textContent=w[5];
  updateBars();
}

function updateBars(){
  var pct=deck.length?Math.round(idx/deck.length*100):0;
  var ct=(idx+1)+"/"+deck.length;
  [1,2,3].forEach(function(n){
    document.getElementById("pbar"+n).style.width=pct+"%";
    document.getElementById("c"+n).textContent=ct;
    document.getElementById("s"+n+"ok").textContent=sOk+"\u2713";
    document.getElementById("s"+n+"no").textContent=sNo+"\u2717";
  });
}

function startSession(){
  var pool=W.filter(function(w){
    if(selLvl!=="all"&&w[0]!==selLvl)return false;
    var ac=Object.keys(selCats).filter(function(k){return selCats[k];});
    if(ac.length>0&&ac.indexOf(w[1])<0)return false;
    return true;
  });
  if(!pool.length){alert("Keine Woerter fuer diese Auswahl.");return;}
  pool.sort(function(a,b){return(getBkt(a)-getBkt(b))+(Math.random()-.5)*.5;});
  deck=pool.slice(0,Math.min(selSize,pool.length));
  idx=0;sOk=0;sNo=0;
  loadCard();show("Front");
}

function reveal(){show("Back");}

function speakIt(){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(deck[idx][4]);
  u.lang="it-IT";u.rate=0.88;
  window.speechSynthesis.speak(u);
}

function answer(ok){
  if(ok)sOk++;else sNo++;
  var w=deck[idx], bkt=getBkt(w);
  setBkt(w,ok?bkt+1:bkt-1);
  var nb=getBkt(w);
  var bktC={1:"#5a5048",2:"#c97a3a",3:"#009246",4:"#6a4a9a"};
  var bktL={1:"Neu",2:"Lernend",3:"Bekannt",4:"Gemeistert"};
  var rb=document.getElementById("rbox");
  var ri=document.getElementById("rico");
  var rl=document.getElementById("rlbl");
  var rs=document.getElementById("rsub");
  if(ok){rb.style.border="1.5px solid #4a9a5a";ri.textContent="\u2713";ri.style.color="#4a9a5a";rl.textContent="Richtig!";rl.style.color="#4a9a5a";}
  else{rb.style.border="1.5px solid #c0392b";ri.textContent="\u2717";ri.style.color="#c0392b";rl.textContent="Nochmal ueben";rl.style.color="#c0392b";}
  rs.textContent=(nb===4?"\u2B50 Gemeistert!":nb===3?"\u2713 Bekannt":nb===2?"Lernend...":"Neu")+" \u00B7 "+bktL[nb];
  rs.style.color=bktC[nb];
  updateBars();show("Result");
}

function nextCard(){
  idx++;
  if(idx>=deck.length){
    var pct=deck.length?Math.round(sOk/deck.length*100):0;
    document.getElementById("demi").innerHTML=pct>=80?"&#127881;":pct>=50?"&#128170;":"&#128218;";
    document.getElementById("dsub").textContent=pct>=80?"Ottimo lavoro!":pct>=50?"Continua cosi!":"Ancora un po'!";
    document.getElementById("dok").textContent=sOk;
    document.getElementById("dno").textContent=sNo;
    document.getElementById("dtot").textContent=deck.length;
    show("Done");updateHomeProgress();
  } else {
    loadCard();show("Front");
  }
}

function endSession(){goHome();}
function goHome(){updateHomeProgress();show("Home");}

// Boot
buildCatGrid();updateHomeProgress();
</script>
